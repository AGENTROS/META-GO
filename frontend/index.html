<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaGo AI Guardian Demo</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; border: 1px solid #333; border-radius: 12px; background: #1e1e1e; }
        h1 { font-size: 24px; color: #4ade80; }
        .panel { margin-top: 20px; padding: 15px; border-radius: 8px; background: #2a2a2a; }
        button { background: #4ade80; color: #000; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #22c55e; }
        .recommendation { border-left: 4px solid #facc15; padding: 10px; margin-top: 15px; background: #333; }
        #logs { font-family: monospace; font-size: 12px; color: #9ca3af; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MetaGo Identity Portal</h1>
        
        <div class="panel">
            <h3>Identity Actions</h3>
            <button onclick="triggerIdentityCreation()">1. Create Identity</button>
            <button onclick="triggerWalletLink()">2. Simulate Wallet Link</button>
            <button onclick="fetchGuardianRecommendations()">3. Check AI Guardian</button>
        </div>

        <div class="panel" id="guardian-panel" style="display: none;">
            <h3>AI Guardian Recommendations</h3>
            <div id="recommendations-container"></div>
        </div>

        <div class="panel">
            <h3>System Logs</h3>
            <div id="logs"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
